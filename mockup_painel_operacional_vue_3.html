    <el-dialog

          <div class="detalhe-item"><strong>Número:</strong> <span>{{ cardSelecionado.codigo }}</span></div>
          <div class="detalhe-item"><strong>Cliente:</strong> <span>{{ cardSelecionado.cliente }}</span></div>
          <div class="detalhe-item"><strong>Descrição:</strong> <span>{{ cardSelecionado.descricao }}</span></div>
          <div class="detalhe-item"><strong>Valor:</strong> <span>{{ cardSelecionado.valor }}</span></div>
          <div class="detalhe-item"><strong>Criação:</strong> <span>{{ cardSelecionado.dataCriacao }}</span></div>
          <div class="detalhe-item"><strong>Término:</strong> <span>{{ cardSelecionado.dataTermino }}</span></div>
        </section>

        <section class="bloco-detalhe">
          <h3 class="bloco-detalhe__titulo">Classificação e fluxo</h3>

          <div class="detalhe-item"><strong>Status:</strong> <span>{{ cardSelecionado.status }}</span></div>
          <div class="detalhe-item"><strong>Coluna:</strong> <span>{{ tituloColuna(cardSelecionado.colunaId) }}</span></div>
          <div class="detalhe-item"><strong>Responsável:</strong> <span>{{ cardSelecionado.usuario }}</span></div>

          <div class="bloco-tags">

              :key="`${cardSelecionado.id}-${tag}`"
              class="tag"
              :class="classeTag(tag)"
            >
              {{ tag }}
            </span>
          </div>

          <div class="bloco-equipe">
            <span
              v-for="usuario in usuariosColuna(cardSelecionado.colunaId)"
              :key="`${cardSelecionado.colunaId}-${usuario}`"
              class="chip-usuario"
            >
              {{ usuario }}
            </span>

</template>

<script>
import axios from 'axios';
import draggable from 'vuedraggable';

export default {
  // name: 'PainelOperacionalNegocios',
  // components: {
  //   draggable
  // },
  data() {
    return {
      larguraColuna: 320,
      modalCriacaoAberta: false,
      modalDetalhesAberta: false,
      cardSelecionado: null,
      configuracaoDrag: {
        name: 'cards-negocios',
        pull: true,
        put: true
      },
      statusDisponiveis: ['Novo', 'Em Andamento', 'Revisão', 'Pendente', 'Concluído'],
      formulario: {
        codigo: '',
        cliente: '',
        valor: '',
        colunaId: 'comercial-oportunidades',
        usuario: 'Eduarda',
        status: 'Novo'
      },
      colunas: [
        {
          id: 'comercial-oportunidades',
          titulo: 'Comercial Oportunidades',
          usuarios: ['Eduarda', 'Egon', 'Fábio', 'Danielle', 'Francielle', 'Renan', 'Otmar']
        },
        {
          id: 'engenharia-gestao',
          titulo: 'Engenharia Gestão',
          usuarios: ['Guilherme']
        },
        {
          id: 'engenharia-supervisao',
          titulo: 'Engenharia Supervisão',
          usuarios: ['Denner', 'Patrícia']
        },
        {
          id: 'engenharia-orcamento',
          titulo: 'Engenharia Orçamento',
          usuarios: ['João', 'Lucas', 'Carol', 'Isabela']
        },
        {
          id: 'aguardando',
          titulo: 'Aguardando',
          usuarios: ['Fornecedor', 'Frete']
        },
        {
          id: 'custos',
          titulo: 'Custos',
          usuarios: ['Denise']
        },
        {
          id: 'gerencia',
          titulo: 'Gerência',
          usuarios: ['Alberto', 'Ricardo']
        },
        {
          id: 'comercial-proposta',
          titulo: 'Comercial Proposta',
          usuarios: ['Eduarda', 'Egon', 'Fábio', 'Danielle', 'Francielle', 'Renan', 'Otmar']
        }
      ],
      cardsAgrupados: {
        'comercial-oportunidades': {
          Eduarda: [
            {
              id: 1,
              codigo: 'N08331V2R1',
              cliente: 'Nome do Cliente',
              descricao: 'Breve descrição do negócio que será apresentado no card para entendimento.',
              dataCriacao: '18/03/26',
              dataTermino: '03/04/26',
              valor: 'R$ 125.000,00',
              colunaId: 'comercial-oportunidades',
              usuario: 'Eduarda',
              status: 'Novo',
              tags: ['Comercial', 'Urgente']
            }
          ],
          Egon: [],
          'Fábio': [],
          Danielle: [],
          Francielle: [],
          Renan: [],
          Otmar: []
        },
        'engenharia-gestao': {
          Guilherme: [
            {
              id: 2,
              codigo: 'N08332V1R1',
              cliente: 'Nome do Cliente',
              descricao: 'Breve descrição do negócio que será apresentado no card para entendimento.',
              dataCriacao: '18/03/26',
              dataTermino: '03/04/26',
              valor: 'R$ 280.000,00',
              colunaId: 'engenharia-gestao',
              usuario: 'Guilherme',
              status: 'Em Andamento',
              tags: ['Engenharia', 'Comercial']
            }
          ]
        },
        'engenharia-supervisao': {
          Denner: [
            {
              id: 3,
              codigo: 'N08334V2R3',
              cliente: 'Nome do Cliente',
              descricao: 'Breve descrição do negócio que será apresentado no card para entendimento.',
              dataCriacao: '18/03/26',
              dataTermino: '03/04/26',
              valor: 'R$ 96.500,00',
              colunaId: 'engenharia-supervisao',
              usuario: 'Denner',
              status: 'Revisão',
              tags: ['Engenharia', 'Gerência']
            }
          ],
          'Patrícia': []
        },
        'engenharia-orcamento': {
          'João': [],
          Lucas: [],
          Carol: [],
          Isabela: []
        },
        aguardando: {
          Fornecedor: [
            {
              id: 4,
              codigo: 'N08334V2R3',
              cliente: 'Nome do Cliente',
              descricao: 'Breve descrição do negócio que será apresentado no card para entendimento.',
              dataCriacao: '18/03/26',
              dataTermino: '03/04/26',
              valor: 'R$ 47.900,00',
              colunaId: 'aguardando',
              usuario: 'Fornecedor',
              status: 'Pendente',
              tags: ['Aguardando', 'Custos']
            }
          ],
          Frete: []
        },
        custos: {
          Denise: []
        },
        gerencia: {
          Alberto: [],
          Ricardo: []
        },
        'comercial-proposta': {
          Eduarda: [],
          Egon: [],
          'Fábio': [],
          Danielle: [],
          Francielle: [],
          Renan: [],
          Otmar: []
        }
      }
    };
  },
  computed: {
    estiloBoard() {
      return {
        '--largura-coluna': `${this.larguraColuna}px`
      };
    },
    usuariosDaColunaSelecionada() {
      const coluna = this.colunas.find(item => item.id === this.formulario.colunaId);
      return coluna ? coluna.usuarios : [];
    }
  },
  watch: {
    'formulario.colunaId'(novoValor) {
      const coluna = this.colunas.find(item => item.id === novoValor);
      this.formulario.usuario = coluna && coluna.usuarios.length ? coluna.usuarios[0] : '';
    }
  },
  methods: {
    cardsPorUsuario(colunaId, usuario) {
      return this.cardsAgrupados[colunaId] && this.cardsAgrupados[colunaId][usuario]
        ? this.cardsAgrupados[colunaId][usuario]
        : [];
    },
    usuariosColuna(colunaId) {
      const coluna = this.colunas.find(item => item.id === colunaId);
      return coluna ? coluna.usuarios : [];
    },
    tituloColuna(colunaId) {
      const coluna = this.colunas.find(item => item.id === colunaId);
      return coluna ? coluna.titulo : '-';
    },
    totalCardsNaColuna(colunaId) {
      const grupo = this.cardsAgrupados[colunaId] || {};
      return Object.keys(grupo).reduce((total, usuario) => total + grupo[usuario].length, 0);
    },
    classeTag(tag) {
      const mapa = {
        Comercial: 'tag--comercial',
        Engenharia: 'tag--engenharia',
        Urgente: 'tag--urgente',
        Custos: 'tag--custos',
        Aguardando: 'tag--aguardando',
        'Gerência': 'tag--gerencia'
      };
      return mapa[tag] || 'tag--comercial';
    },
    classeStatus(status) {
      const mapa = {
        Novo: 'status--novo',
        'Em Andamento': 'status--em-andamento',
        Revisão: 'status--revisao',
        Pendente: 'status--pendente',
        'Concluído': 'status--concluido'
      };
      return mapa[status] || 'status--novo';
    },
    abrirModalCriacao() {
      this.modalCriacaoAberta = true;
    },
    abrirDetalhes(card) {
      this.cardSelecionado = JSON.parse(JSON.stringify(card));
      this.modalDetalhesAberta = true;
    },
    criarNegocio() {
      if (!this.formulario.codigo || !this.formulario.cliente || !this.formulario.valor) {
        this.$message.warning('Preencha Número Negócio, Cliente e Valor.');
        return;
      }

      const novoCard = {
        id: Date.now(),
        codigo: this.formulario.codigo,
        cliente: this.formulario.cliente,
        descricao: 'Breve descrição do negócio que será apresentado no card para entendimento.',
        dataCriacao: '18/03/26',
        dataTermino: '03/04/26',
        valor: this.formulario.valor,
        colunaId: this.formulario.colunaId,
        usuario: this.formulario.usuario,
        status: this.formulario.status,
        tags: ['Comercial', 'Urgente']
      };

      this.cardsAgrupados[this.formulario.colunaId][this.formulario.usuario].unshift(novoCard);
      this.modalCriacaoAberta = false;
      this.resetarFormulario();
      this.$message.success('Negócio criado com sucesso.');
    },
    resetarFormulario() {
      this.formulario = {
        codigo: '',
        cliente: '',
        valor: '',
        colunaId: 'comercial-oportunidades',
        usuario: 'Eduarda',
        status: 'Novo'
      };
    },
    aoMoverCard(evento, colunaIdDestino, usuarioDestino) {
      if (!evento || !evento.added) {
        return;
      }

      const cardMovido = evento.added.element;
      cardMovido.colunaId = colunaIdDestino;
      cardMovido.usuario = usuarioDestino;

      //this.sincronizarCard(cardMovido);
    },
    sincronizarCard(card) {
      axios
        .post('/api/v1/negocios/mover', {
          id: card.id,
          coluna_id: card.colunaId,
          usuario: card.usuario,
          status: card.status
        })
        .then(() => {
          this.$message.success(`Card ${card.codigo} movido para ${this.tituloColuna(card.colunaId)}.`);
        })
        .catch(() => {
          this.$message.error('Falha ao sincronizar movimentação do card.');
        });
    }
  }
};
</script>
