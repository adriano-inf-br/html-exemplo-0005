<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; padding: 20px; color: #333; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 400px; background: #fff; }
        .avatar { width: 80px; height: 80px; background: #007bff; border-radius: 50%; margin-bottom: 10px; }
        h1 { color: #007bff; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar"></div>
        <h1>João Silva</h1>
        <p><strong>Cargo:</strong> Desenvolvedor Front-end</p>
        <p>Bem-vindo ao seu painel de controle. Aqui você pode gerenciar suas informações pessoais e configurações de conta.</p>
    </div>
</body>
</html>
